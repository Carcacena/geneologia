<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Menu - Genealogia</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#2c3e50,#4caf50);
    color:white;
    text-align:center;
    padding:40px;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background: rgba(0,0,0,0.45);
    padding:35px;
    border-radius:12px;
    min-width:280px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:25px;
}

button{
    display:block;
    width:100%;
    margin:12px 0;
    padding:12px;
    border:none;
    background:#ff9800;
    color:white;
    cursor:pointer;
    border-radius:6px;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    background:#4CAF50;
    transform:scale(1.03);
}

hr{
    margin:20px 0;
    border:1px solid rgba(255,255,255,0.2);
}

.info{
    margin-top:15px;
    font-size:13px;
    color:#ddd;
}

</style>
</head>

<body>

<div class="box">

    <h2>🌳 Sistema Genealogia</h2>

    <button onclick="irExpandida()">
        🌲 Árvore Completa
    </button>

    <button onclick="irColapsada()">
        🌿 Árvore Colapsada
    </button>

    <button onclick="irUsuario()">
        👤 Cadastro Usuário
    </button>

    <hr>

    <button onclick="sair()">
        🚪 Sair
    </button>

    <div class="info">
        Usuário autenticado com JWT 🔐
    </div>

</div>

<script>

// 🔐 PROTEÇÃO DE ACESSO
const token = localStorage.getItem("token");

if(!token){

    window.location.href = "login.html";
}

// 🚀 NAVEGAÇÃO
function irUsuario(){

    window.location.href = "crudUsuario.html";
}

function irExpandida(){

    window.location.href = "pessoa.html";
}

function irColapsada(){

    window.location.href = "arvoreColapsada.html";
}

// 🚪 LOGOUT
function sair(){

    localStorage.removeItem("token");

    window.location.href = "login.html";
}

</script>

</body>
</html>

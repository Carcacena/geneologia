
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Árvore Genealógica Colapsada</title>
<style>
body { font-family: Arial; margin:20px; }
ul { list-style:none; padding-left:20px; }
li { margin:4px 0; position:relative; }
#arvore { margin-top:20px; }
.action-btn { cursor:pointer; margin-left:5px; font-weight:bold; }
.action-btn:hover { color:#4CAF50; }

/* PAINEL FLUTUANTE */
#painel{
    position:absolute;
    background:#fff;
    border:1px solid #ccc;
    padding:8px;
    border-radius:6px;
    display:none;
    z-index:1000;
    cursor:move;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
#painel button{ display:inline-block; margin:2px; }

/* MODAIS */
.modal {
    display:none;
    position:fixed;
    top:10%;
    left:50%;
    transform:translateX(-50%);
    background:#fff;
    padding:20px;
    border:1px solid #ccc;
    z-index:3000;
    width:320px;
    max-height:400px;
    overflow:auto;
}
.overlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.3);
    z-index:2000;
}

/* JUDIA - destaque surreal */
#judiaFigura{
    position:fixed;
    top:10px;
    right:10px;
    font-size:1.8rem;
    color:#FF0000;
    text-shadow: 0 0 10px #FF0000, 0 0 20px #FF4500, 0 0 30px #FFA500;
    z-index:5000;
}
</style>
</head>
<body>

<h2>Árvore Genealógica Colapsada</h2>

<div id="arvore"></div>

<div id="painel">
    <button onclick="abrirModalMover()">Mover</button>
    <button onclick="abrirModalAlterar()">Alterar</button>
    <button onclick="abrirModalIncluir()">Incluir</button>
    <button onclick="abrirModalExcluir()">Excluir</button>
	
</div>

<!-- Modal Mover -->
<div class="modal" id="modal-mover">
    <h3>Escolha o novo pai</h3>
    <div id="conteudoMover"></div>
    <br>
    <button onclick="fecharModal('mover')">Cancelar</button>
    <button onclick="confirmarMover()">Confirmar</button>
</div>

<!-- Modal Alterar -->
<div class="modal" id="modal-alterar">
    <h3>Alterar Pessoa</h3>
    <div>
        Nome: <input type="text" id="alterarNome"><br><br>
        Nota: <textarea id="alterarNota" rows="3" style="width:100%"></textarea><br><br>
        <button onclick="confirmarAlterar()">Confirmar</button>
        <button onclick="fecharModal('alterar')">Voltar</button>
    </div>
</div>

<!-- Modal Excluir -->
<div class="modal" id="modal-excluir">
    <h3>Excluir Pessoa</h3>
    <div>
        <div id="excluirNome"></div>
        <div id="excluirNota" style="margin-top:5px; font-size:0.9em; color:#555;"></div>
        <br>
        <button onclick="confirmarExcluir()">Confirmar</button>
        <button onclick="fecharModal('excluir')">Voltar</button>
    </div>
</div>

<!-- Modal Incluir -->
<div class="modal" id="modal-incluir">
    <h3>Incluir Pessoa</h3>
    <div>
        <label for="incluirNome">Nome:</label>
        <input type="text" id="incluirNome"><br><br>
 		<button onclick="confirmarIncluir()">Confirmar</button>
		<button onclick="fecharModal('incluir')">Cancelar</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="judiaFigura">JUDIA</div>

<script>
let pessoas = [];
let selecionadoId = null;
let painel;

const tipoUsuario = parseInt(sessionStorage.getItem("tipo") || "9");
function podeMover(){ return true; }
function podeAlterar(){ return tipoUsuario <= 1; }
function podeIncluir(){ return tipoUsuario <= 1; }
function podeExcluir(){ return tipoUsuario === 0; }

window.onload = async () => {
    painel = document.getElementById('painel');
    ativarDragPainel();
    await carregar();
};

function abrirModalIncluir(){

    if(!podeIncluir()) return alert("Sem permissão");

    painel.style.display='none';

    document.getElementById('incluirNome').value = '';

    document.getElementById('modal-incluir').style.display='block';

    document.getElementById('overlay').style.display='block';
}
async function confirmarIncluir(){

    let nome =
        document.getElementById('incluirNome').value.trim();

    if(!nome) return;
	
	const token = JSON.parse(
		    localStorage.getItem("token")
		).token;

  
    try{

        const resp = await fetch('/pessoas', {

            method:'POST',

            headers:{
                'Content-Type':'application/json',
                'Authorization':'Bearer ' + token
            },

            body: JSON.stringify({
                nome: nome,
                nota: null,
                nomeId: selecionadoId
            })
        });

        if(!resp.ok){

            console.log(resp.status);

            alert("Erro ao incluir");

            return;
        }

        fecharModal('incluir');

        await carregar();

    }catch(e){

        console.error(e);

        alert("Erro ao incluir");
    }
}






function ativarDragPainel(){
    let drag=false, offsetX=0, offsetY=0;
    painel.addEventListener("mousedown", e=>{
        drag=true;
        offsetX = e.clientX - painel.offsetLeft;
        offsetY = e.clientY - painel.offsetTop;
    });
    document.addEventListener("mousemove", e=>{
        if(!drag) return;
        painel.style.left = (e.clientX - offsetX) + "px";
        painel.style.top  = (e.clientY - offsetY) + "px";
    });
    document.addEventListener("mouseup", ()=>{ drag=false; });
}
async function carregar(){

    const token = JSON.parse(
        localStorage.getItem("token")
    ).token;

    const resp = await fetch('/pessoas', {

        headers: {
            "Authorization": "Bearer " + token
        }

    });

    console.log(resp.status);

    pessoas = await resp.json();

    desenhar();
}


function montar(lista, pai=null){
    return lista
        .filter(p=>{
            let paiId = p.nomeId ?? p.nome_id;
            return pai===null ? paiId==null : Number(paiId)===Number(pai);
        })
        .map(p=>({...p, filhos: montar(lista,p.id)}));
}

function render(nos, nivel=0){
    if(!nos.length) return '';
    let html='<ul>';
    nos.forEach(n=>{
        html+=`<li>
            ${n.nome}
            ${n.nota?`<div style="font-size:0.8em;color:#555">${n.nota}</div>`:''}
            ${nivel>=2?`<span class="action-btn" onclick="abrirPainel(${n.id},this,event)">⚙</span>`:''}
            ${render(n.filhos, nivel+1)}
        </li>`;
    });
    html+='</ul>';
    return html;
}

function desenhar(){
    document.getElementById('arvore').innerHTML = render(montar(pessoas));
}

function abrirPainel(id, el, ev){
    ev.stopPropagation();
    selecionadoId = id;
    const botoes = painel.querySelectorAll("button");
    botoes[0].style.display = podeMover()   ? "inline-block" : "none";
    botoes[1].style.display = podeAlterar() ? "inline-block" : "none";
    botoes[2].style.display = podeIncluir() ? "inline-block" : "none";
    botoes[3].style.display = podeExcluir() ? "inline-block" : "none";

    painel.style.display = 'block';
    if(!painel.style.left){
        painel.style.top = el.getBoundingClientRect().top + window.scrollY + 'px';
        painel.style.left = el.getBoundingClientRect().left + 30 + window.scrollX + 'px';
    }
}

// MOVER
function abrirModalMover(){
    if(!podeMover()) return alert("Sem permissão");
    painel.style.display='none';
    let html='';
    pessoas.forEach(p=>{
        if(p.id!==selecionadoId){
            html+=`<div>
                <input type="radio" name="destino" value="${p.id}"> ${p.nome}
            </div>`;
        }
    });
    document.getElementById('conteudoMover').innerHTML = html;
    document.getElementById('modal-mover').style.display='block';
    document.getElementById('overlay').style.display='block';
}

async function confirmarMover(){

    const sel =
        document.querySelector('input[name="destino"]:checked');

    if(!sel){
        alert('Escolha um destino');
        return;
    }

	const token = JSON.parse(
		    localStorage.getItem("token")
		).token;
   
    try{

        const resp = await fetch('/pessoas/mover',{

            method:'POST',

            headers:{
                'Content-Type':'application/json',
                'Authorization':'Bearer ' + token
            },

            body:JSON.stringify({
                childId:selecionadoId,
                newParentId:Number(sel.value)
            })
        });

        if(!resp.ok){
            alert(await resp.text());
            return;
        }

        fecharModal('mover');

        await carregar();

    }catch(e){

        alert('Erro ao mover');

        console.error(e);
    }
}
// ALTERAR
function abrirModalAlterar(){
    if(!podeAlterar()) return alert("Sem permissão");
    let p = pessoas.find(p=>p.id===selecionadoId);
    if(!p) return;
    document.getElementById('alterarNome').value = p.nome;
    document.getElementById('alterarNota').value = p.nota || '';
    painel.style.display='none';
    document.getElementById('modal-alterar').style.display='block';
    document.getElementById('overlay').style.display='block';
}

function confirmarAlterar(){
    let p = pessoas.find(p=>p.id===selecionadoId);
    if(!p) return;
    p.nome = document.getElementById('alterarNome').value;
    p.nota = document.getElementById('alterarNota').value;
    desenhar();
    fecharModal('alterar');
}

// INCLUIR


// EXCLUIR
function abrirModalExcluir(){
    if(!podeExcluir()) return alert("Sem permissão");
    let p = pessoas.find(p=>p.id===selecionadoId);
    if(!p) return;
    document.getElementById('excluirNome').innerText = p.nome;
    document.getElementById('excluirNota').innerText = p.nota || '';
    painel.style.display='none';
    document.getElementById('modal-excluir').style.display='block';
    document.getElementById('overlay').style.display='block';
}

function confirmarExcluir(){
    pessoas = pessoas.filter(x=>x.id!==selecionadoId);
    desenhar();
    fecharModal('excluir');
}

function fecharModal(tipo){
    document.getElementById('modal-'+tipo).style.display='none';
    document.getElementById('overlay').style.display='none';
}

/* ================================
       JUDIA - TEXTO + VOZ
       ================================ */
const textoJudia = "Magia: Judia está pronta para atuar na árvore colapsada!";
setTimeout(() => {
    const fala = new SpeechSynthesisUtterance(textoJudia);
    fala.lang = "pt-BR";
    fala.rate = 1;
    fala.pitch = 1;
    fala.volume = 1;
    speechSynthesis.speak(fala);
}, 1500);
</script>

</body>
</html>

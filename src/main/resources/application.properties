spring.application.name=arvore-genealogica-pro

# ===================================================================
# CONEXĂO COM O BANCO DE DADOS (RAILWAY + FEDORA LOCAL)
# ===================================================================
# PLANO A: Injeta a URL do Railway se existir. PLANO B: Usa o localhost do seu Fedora.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/arvore?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&connectionCollation=utf8mb4_unicode_ci}

# PLANO A: Injeta o usuário do Railway se existir. PLANO B: Usa o 'root' local.
spring.datasource.username=${MYSQLUSER:root}

# PLANO A: Injeta a senha do Railway se existir. PLANO B: Usa a sua senha local do MySQL 9.
spring.datasource.password=${MYSQLPASSWORD:Gur1j0$e2026!}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURAÇŐES DO HIBERNATE / JPA
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' atualiza as tabelas localmente. No Railway, ele se adapta de forma segura.
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# FLYWAY MIGRATIONS
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================================================================
# SERVIDOR E AUTENTICAÇĂO SEGURA (JWT)
# ===================================================================
server.port=${PORT:8080}
server.address=0.0.0.0

# Chave estável Hexadecimal idęntica ao painel do Railway (Resolve o erro da linha 23)
jwt.secret=${JWT_SECRET:7f5c2b3a1e4d8f9c0b2a3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a}
jwt.expiration=${JWT_EXPIRATION:86400000}
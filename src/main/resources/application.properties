# CORREÇÃO: Usando as variáveis individuais da imagem para montar a URL JDBC perfeita
spring.datasource.url=jdbc:${MYSQL_URL}?allowPublicKeyRetrieval=true&useSSL=false
#spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ATENÇÃO: 'validate' exige que o Flyway já tenha criado as tabelas antes do Hibernate iniciar
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# AGORA O FLYWAY ESTÁ LIGADO PARA RODAR OS SEUS INSERTS
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration


server.port=${PORT:8080}
server.address=0.0.0.0
jwt.secret=${JWT_SECRET:7f5c2b3a1e4d8f9c0b2a3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a}
#jwt.secret=${JWT_SECRET:9a8b7c6d5e4f3g2h1i0j9k8l7m6n5o4p3q2r1s0t9u8v7w6x5y4z3a2b1c0d9e8f}
jwt.expiration=${JWT_EXPIRATION:86400000}

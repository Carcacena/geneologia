spring.application.name=arvore-geneologia-pro

# Configuração do Banco de Dados MySQL (Mapeado com underline idêntico ao Railway)


spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

#spring.datasource.username=${MYSQL_USER:root}
#spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql.railway.internal}:3306/${MYSQL_DATABASE:railway}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Desativar Flyway (conforme seu padrão)
spring.flyway.enabled=false

# Configurações de Rede para o Railway
server.port=${PORT:8080}
server.address=0.0.0.0

# JWT Configurações
jwt.secret=${JWT_SECRET:genealogia_jwt_security_super_chave_2026_magia_absoluta}
jwt.expiration=${JWT_EXPIRATION:86400000}

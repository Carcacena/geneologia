
spring.application.name=arvore-geneologia-pro

# Configuração do Banco de Dados MySQL (Corrigido para o padrão Railway + Valores padrão para testes locais)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:arvore_db}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings (Removido o MySQL8Dialect problemático)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Desativar Flyway (conforme seu padrão)
spring.flyway.enabled=false

# Configurações de Rede para o Railway (Corretas)
server.port=${PORT:8080}
server.address=0.0.0.0

# JWT Configurações
jwt.secret=${JWT_SECRET:genealogia_jwt_security_super_chave_2026_magia_absoluta}
jwt.expiration=${JWT_EXPIRATION:86400000}

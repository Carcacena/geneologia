#spring.application.name=arvore-geneologia-pro

# Injeta a URL automática do Railway adicionando o prefixo obrigatório do JDBC

# Alterado para ler MYSQL_PUBLIC_URL (a variável que existe com o ícone amarelo)
spring.datasource.url=jdbc:${MYSQL_PUBLIC_URL:mysql://localhost:3306/railway}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Desativar Flyway
spring.flyway.enabled=false
#spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration,classpath:db/testdata


# Configurações de Rede para o Railway
server.port=${PORT:8080}
server.address=0.0.0.0

# JWT Configurações
#jwt.secret=${JWT_SECRET:genealogia_jwt_security_super_chave_2026_magia_absoluta}
jwt.secret=${JWT_SECRET:7f3b89e1f44b249c9fcf84bc0bf4e2fb}
jwt.expiration=${JWT_EXPIRATION:86400000}

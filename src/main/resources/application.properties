spring.application.name=arvore-geneologia-pro

# 1. Conexão Segura e Forçada com o MySQL do Railway (Suporta Acentos e Fusos Horários)
spring.datasource.url=jdbc:${MYSQL_URL}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate em modo UPDATE (Garante tabelas prontas sem travar a inicialização)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 #spring.jpa.hibernate.ddl-auto=update
 #spring.jpa.show-sql=true
 #spring.jpa.properties.hibernate.format_sql=true
 spring.jpa.open-in-view=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true





# 3. Gerenciamento pelo Flyway (Evita conflitos com tabelas já existentes)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

#spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
#spring.flyway.locations=classpath:db/migration




# 4. Porta Dinâmica para Nuvem
server.port=${PORT:8080}
server.address=0.0.0.0

# 5. JWT Fixo em Produção (Garante consistência na validação dos Tokens)
jwt.secret=9a4f2c8d3e7b1a5f6c8d9e0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c
jwt.expiration=86400000

# 6. Logs em modo INFO para limpar o console de ruídos desnecessários
logging.level.org.springframework.security=INFO
://br.com.jose=DEBUG
